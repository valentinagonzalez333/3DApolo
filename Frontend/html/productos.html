<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - Apolo3D</title>
  <link rel="stylesheet" href="../css/productos.css">
  <script src="../js/productos.js" defer></script>
</head>

<body>

  <div class="layout">

    <aside class="menu" id="menu">
      <nav>
        <ul>
          <li><a href="/inicio">Dashboard</a></li>
          <li><a href="/productos" >Productos</a></li>
          <li><a href="/ventas">Ventas</a></li>
          <li><a href="/reportes">Informe</a></li>
          <li><a href="/gastos">Gastos</a></li>
          <li><a href="/configuracion">Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="contenido">

      <button class="btn-menu" id="btn">☰</button>

      <div class="container">
        <div class="toggle">
          <input type="checkbox" id="btn_modo">
          <span class="button"></span>
          <span class="label">☼</span>
        </div>
      </div>

      <div class="form-contenedor">
        <input type="text" class="buscador" id="buscador" placeholder="Buscar productos..">
      </div>

      <div class="table">
        <div class="table-rs">
          <section class="table-body">
            <h1>Productos</h1>
            <button class="btn-agregar" onclick="abrirModal()">Agregar Producto</button>
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Foto</th>
                  <th>Nombre</th>
                  <th>Categoría</th>
                  <th>Proveedor</th>
                  <th>Compra</th>
                  <th>Venta</th>
                  <th>Stock</th>
                  <th>Min</th>
                  <th>IVA</th>
                  <th>Desc.</th>
                  <th>Estado</th>
                  <th>Descripción</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaProductos"></tbody>
            </table>
          </section>
        </div>
      </div>

    </main>
  </div>

  <!-- MODAL -->
  <div id="modalProducto" class="modal">
    <div class="contenido-formulario">

      <h2 id="tituloProducto">Nuevo Producto</h2>

      <form id="formProducto" enctype="multipart/form-data">

        <input type="hidden" id="productoId" name="productoId">

        <label>Nombre</label>
        <input type="text" id="nombre" name="nombre">

        <label>Categoría</label>
        <select id="categoria" name="categoria_id"></select>

        <label>Proveedor</label>
        <select id="proveedor" name="proveedor_id"></select>

        <label>Precio compra</label>
        <input type="number" id="compra" name="precio_compra" min="0">

        <label>Precio venta</label>
        <input type="number" id="venta" name="precio_venta" min="0">

        <label>Stock</label>
        <input type="number" id="stock" name="stock" min="0">

        <label>Stock mínimo</label>
        <input type="number" id="stockMin" name="stock_minimo" min="0">

        <label>IVA</label>
        <input type="number" id="iva" name="iva" min="0" max="100">

        <label>Descuento</label>
        <input type="number" id="descuenti" name="descuenti" min="0" max="100">

        <label>Descripción</label>
        <textarea id="descripcion" name="descripcion"></textarea>

        <label>Imagen</label>
        <input type="file" id="imagen" name="imagen" accept="image/*">

        <label>Estado</label>
        <select id="estado" name="estado">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>

        <div class="modal-buttons">
          <button type="submit">Guardar</button>
          <button type="button" id="cerrarModalProducto">Cancelar</button>
        </div>

      </form>
    </div>
  </div>

  <script>
    const btn  = document.getElementById("btn");
    const menu = document.getElementById("menu");

    btn.addEventListener("click", () => {
      menu.classList.toggle("activo");
    });
  </script>

</body>
</html>
