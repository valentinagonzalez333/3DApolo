<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador</title>
  <link rel="stylesheet" href="../css/ventas.css">
  <script src="../js/ventas.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="layout">


    <aside class="menu" id="menu">
      <nav>
        <ul>
          <li><a href="/inicio">Dashboard</a></li>
          <li><a href="/productos">Productos</a></li>
          <li><a href="/ventas">Ventas</a></li>
          <li><a href="/reportes">Reportes</a></li>
          <li><a href="/usuarios">Usuarios</a></li>
          <li><a href="/gastos">Gastos</a></li>
          <li><a href="/configuracion">Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="contenido">


      <button class="btn-menu" id="btn">☰</button>

      <!-- From Uiverse.io by Pradeepsaranbishnoi -->
      <div class="container">
        <div class="toggle">
          <input type="checkbox" id="btn_modo">
          <span class="button"></span>
          <span class="label">☼</span>
        </div>
      </div>

      <div class="form-contenedor">
        <input type="text" class="buscador" placeholder="  search">
      </div>
      <div class="ventas">
        <h1>Ventas</h1>
         
      </div>

    </main>

  </div>


   <!-- Ventana de cofirmación -->
  <div class="modal">
    <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Foto</th>
                <th>Producto</th>
                <th>Fecha</th>
                <th>Cantidad</th>
                <th>Total</th>
                <th>Pago</th>
                <th>Empleado</th>
                <th>Subtotal</th>
                <th>Desc.</th>
              </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
          </table>


  </div>
  <script>
    const btn = document.getElementById("btn");
    const menu = document.getElementById("menu");

    btn.addEventListener("click", () => {
      menu.classList.toggle("activo");
    });
  </script>
</body>

</html>
