<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador</title>
  <link rel="stylesheet" href="/css/panel.css">
  <script src="/js/panel.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="layout">


    <aside class="menu" id="menu">
      <nav>
        <ul>
          <li><a href="/inicio">Dashboard</a></li>
          <li><a href="/productos">Productos</a></li>
          <li><a href="/ventas">Ventas</a></li>
          <li><a href="/reportes">Informe</a></li>
          <li><a href="/gastos">Gastos</a></li>
          <li><a href="/configuracion">Configuración</a></li>
        </ul>
      </nav>
    </aside>

    <main class="contenido">


      <button class="btn-menu" id="btn">☰</button>

      <!-- From Uiverse.io by Pradeepsaranbishnoi -->
      <div class="container">
        <div class="toggle">
          <input type="checkbox" id="btn_modo">
          <span class="button"></span>
          <span class="label">☼</span>
        </div>
      </div>

      <div class="form-contenedor">
        <input type="text" class="buscador" id="buscador" placeholder="Buscar...">
      </div>

<div class="cards">

  <div class="card ventas">
    <i data-lucide="trending-up"></i>
    <p>Ventas</p>
    <h2 id="ventas">0</h2>
  </div>

  <div class="card gastos">
    <i data-lucide="wallet"></i>
    <p>Gastos</p>
    <h2 id="gastos">0</h2>
  </div>

  <div class="card usuarios">
    <i data-lucide="users"></i>
    <p>Usuarios</p>
    <h2 id="usuarios">0</h2>
  </div>

  <div class="card productos">
    <i data-lucide="package"></i>
    <p>Productos</p>
    <h2 id="productos">0</h2>
  </div>

</div>

<div class="tabla">
  <div class="tabla-header">
    <h3><i data-lucide="receipt"></i> Registro del día</h3>
    <span>últimos movimientos</span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Descripción</th>
        <th>Monto</th>
        <th>Fecha</th>
      </tr>
    </thead>

    <tbody id="tablaDatos"></tbody>
  </table>
</div>
    </main>

  </div>

  <script>
    const btn = document.getElementById("btn");
    const menu = document.getElementById("menu");

    btn.addEventListener("click", () => {
      menu.classList.toggle("activo");
    });
  </script>
  <script>
  window.history.pushState(null, null, window.location.href);

  window.onpopstate = function () {
    window.location.href = "/inicio";
  };
</script>
</body>

</html>
